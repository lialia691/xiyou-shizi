<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯净拼音发音测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .test-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        h1 {
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        .character-display {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .character-text {
            font-size: 5em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }
        
        .option-btn {
            padding: 20px 15px;
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 60px;
        }
        
        .option-btn:hover:enabled {
            background-color: #f0f8ff;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .option-btn.playing {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            animation: optionPulse 0.6s ease-in-out;
        }
        
        .option-btn.correct-option {
            background: #4CAF50;
            color: white;
            border-color: #45a049;
        }
        
        .option-btn.wrong-option {
            background: #f44336;
            color: white;
            border-color: #da190b;
        }
        
        @keyframes optionPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 1.1em;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .controls {
            margin: 20px 0;
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .status {
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9em;
        }
        
        .info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9em;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔇 纯净拼音发音测试</h1>
        
        <div class="info">
            <strong>测试目标：</strong>只播放拼音发音，无其他音效<br>
            <strong>特点：</strong>
            <ul>
                <li>✅ 点击拼音选项播放发音</li>
                <li>❌ 无正确答案提示音</li>
                <li>❌ 无错误答案提示音</li>
                <li>❌ 无关卡完成音效</li>
            </ul>
        </div>
        
        <div class="status" id="status">正在初始化语音系统...</div>
        
        <div class="character-display">
            <div class="character-text" id="character-text">的</div>
        </div>
        
        <div class="feedback" id="feedback">点击拼音选项听发音，然后选择正确答案</div>
        
        <div class="quiz-options" id="quiz-options">
            <button class="option-btn" data-pinyin="de">de</button>
            <button class="option-btn" data-pinyin="lái">lái</button>
            <button class="option-btn" data-pinyin="zài">zài</button>
            <button class="option-btn" data-pinyin="tā">tā</button>
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="initTest()">🔄 重新开始</button>
            <button class="control-btn" onclick="nextQuestion()">➡️ 下一题</button>
            <button class="control-btn" onclick="resetQuestion()">🔄 重置本题</button>
        </div>
    </div>

    <script src="speech-system.js"></script>
    <script>
        let speechSystem = null;
        let currentChar = { char: '的', pinyin: 'de' };
        let correctPinyin = 'de';
        let questionAnswered = false;
        
        const testChars = [
            { char: '的', pinyin: 'de' },
            { char: '一', pinyin: 'yī' },
            { char: '是', pinyin: 'shì' },
            { char: '了', pinyin: 'le' },
            { char: '我', pinyin: 'wǒ' },
            { char: '不', pinyin: 'bù' },
            { char: '在', pinyin: 'zài' },
            { char: '人', pinyin: 'rén' }
        ];
        
        let currentIndex = 0;
        
        async function initTest() {
            const statusEl = document.getElementById('status');
            
            try {
                statusEl.innerHTML = '🔄 正在初始化语音系统...';
                
                speechSystem = new SpeechSystem();
                await speechSystem.init();
                
                const status = speechSystem.getStatus();
                
                if (status.isSupported && status.isEnabled) {
                    statusEl.innerHTML = `✅ 纯净语音系统就绪！只播放拼音发音`;
                    loadQuestion();
                } else {
                    statusEl.innerHTML = '❌ 语音系统不可用';
                }
            } catch (error) {
                statusEl.innerHTML = `❌ 初始化失败: ${error.message}`;
                console.error('初始化失败:', error);
            }
        }
        
        function loadQuestion() {
            currentChar = testChars[currentIndex];
            correctPinyin = currentChar.pinyin;
            questionAnswered = false;
            
            // 更新显示
            document.getElementById('character-text').textContent = currentChar.char;
            document.getElementById('feedback').textContent = '点击拼音选项听发音，然后选择正确答案';
            document.getElementById('feedback').style.color = 'white';
            
            // 生成选项
            generateOptions();
            
            // 重置按钮状态
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct-option', 'wrong-option', 'playing');
            });
        }
        
        function generateOptions() {
            const allPinyins = testChars.map(char => char.pinyin);
            const wrongOptions = allPinyins
                .filter(pinyin => pinyin !== correctPinyin)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3);
            
            const options = [correctPinyin, ...wrongOptions]
                .sort(() => Math.random() - 0.5);
            
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach((btn, index) => {
                btn.textContent = options[index];
                btn.dataset.pinyin = options[index];
                btn.onclick = () => handleOptionClick(btn);
            });
        }
        
        async function handleOptionClick(button) {
            if (button.disabled || questionAnswered) return;
            
            // 检查语音系统播放状态
            if (speechSystem && speechSystem.isPlaying) {
                console.log('⏸️ 语音正在播放中，跳过新的播放请求');
                return;
            }
            
            const clickedPinyin = button.dataset.pinyin;
            
            // 🔊 只播放拼音发音，无其他音效
            if (clickedPinyin && speechSystem) {
                button.classList.add('playing');
                
                try {
                    await speechSystem.speakPinyin(clickedPinyin);
                } catch (error) {
                    console.error('播放失败:', error);
                }
                
                setTimeout(() => {
                    button.classList.remove('playing');
                }, 600);
            }
            
            // 延迟处理答题逻辑，让用户听到发音
            setTimeout(() => {
                if (questionAnswered) return;
                
                questionAnswered = true;
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(btn => btn.disabled = true);
                
                if (clickedPinyin === correctPinyin) {
                    // 答对了 - 无音效，只有视觉反馈
                    button.classList.add('correct-option');
                    document.getElementById('feedback').innerHTML = '✅ 答对了！（无音效）';
                    document.getElementById('feedback').style.color = '#4CAF50';
                } else {
                    // 答错了 - 无音效，只有视觉反馈
                    button.classList.add('wrong-option');
                    const correctBtn = [...buttons].find(btn => btn.dataset.pinyin === correctPinyin);
                    if (correctBtn) correctBtn.classList.add('correct-option');
                    document.getElementById('feedback').innerHTML = '❌ 答错了！正确答案已标出（无音效）';
                    document.getElementById('feedback').style.color = '#f44336';
                }
            }, 400);
        }
        
        function nextQuestion() {
            currentIndex = (currentIndex + 1) % testChars.length;
            loadQuestion();
        }
        
        function resetQuestion() {
            loadQuestion();
        }
        
        // 页面加载时自动初始化
        window.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
