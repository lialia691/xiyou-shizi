<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单语音测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #f0f0f0;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .status {
            background: #e3f2fd;
            border: 1px solid #2196f3;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
        }
        
        .test-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        
        .test-btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 20px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .test-btn:hover {
            background: #1976d2;
            transform: translateY(-2px);
        }
        
        .test-btn:active {
            transform: translateY(0);
        }
        
        .test-btn.playing {
            background: #4caf50;
            animation: pulse 0.6s ease-in-out;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        
        .control-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
            font-size: 1em;
        }
        
        .control-btn:hover {
            background: #f57c00;
        }
        
        .voice-info {
            background: #f5f5f5;
            border-radius: 5px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 简单语音测试</h1>
        
        <div class="status" id="status">点击"初始化"开始测试</div>
        
        <div class="controls">
            <button class="control-btn" onclick="initVoice()">🔄 初始化语音</button>
            <button class="control-btn" onclick="testAll()">🎵 测试全部</button>
            <button class="control-btn" onclick="stopVoice()">🛑 停止播放</button>
        </div>
        
        <div class="voice-info" id="voice-info">语音信息将在这里显示</div>
        
        <div class="test-buttons">
            <button class="test-btn" onclick="testVoice('的', this)">的</button>
            <button class="test-btn" onclick="testVoice('一', this)">一</button>
            <button class="test-btn" onclick="testVoice('是', this)">是</button>
            <button class="test-btn" onclick="testVoice('了', this)">了</button>
            <button class="test-btn" onclick="testVoice('我', this)">我</button>
            <button class="test-btn" onclick="testVoice('你', this)">你</button>
            <button class="test-btn" onclick="testVoice('他', this)">他</button>
            <button class="test-btn" onclick="testVoice('好', this)">好</button>
            <button class="test-btn" onclick="testVoice('学', this)">学</button>
            <button class="test-btn" onclick="testVoice('习', this)">习</button>
            <button class="test-btn" onclick="testVoice('汉', this)">汉</button>
            <button class="test-btn" onclick="testVoice('字', this)">字</button>
        </div>
        
        <div class="test-buttons">
            <button class="test-btn" onclick="testPinyin('de', this)">de</button>
            <button class="test-btn" onclick="testPinyin('yī', this)">yī</button>
            <button class="test-btn" onclick="testPinyin('shì', this)">shì</button>
            <button class="test-btn" onclick="testPinyin('le', this)">le</button>
            <button class="test-btn" onclick="testPinyin('wǒ', this)">wǒ</button>
            <button class="test-btn" onclick="testPinyin('nǐ', this)">nǐ</button>
            <button class="test-btn" onclick="testPinyin('tā', this)">tā</button>
            <button class="test-btn" onclick="testPinyin('hǎo', this)">hǎo</button>
            <button class="test-btn" onclick="testPinyin('xué', this)">xué</button>
            <button class="test-btn" onclick="testPinyin('xí', this)">xí</button>
            <button class="test-btn" onclick="testPinyin('hàn', this)">hàn</button>
            <button class="test-btn" onclick="testPinyin('zì', this)">zì</button>
        </div>
    </div>

    <script>
        let speechSynthesis = window.speechSynthesis;
        let voices = [];
        let currentVoice = null;
        let isPlaying = false;
        
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }
        
        function updateVoiceInfo() {
            const infoEl = document.getElementById('voice-info');
            if (currentVoice) {
                infoEl.innerHTML = `
                    <strong>当前语音:</strong> ${currentVoice.name}<br>
                    <strong>语言:</strong> ${currentVoice.lang}<br>
                    <strong>本地语音:</strong> ${currentVoice.localService ? '是' : '否'}
                `;
            } else {
                infoEl.textContent = '未选择语音';
            }
        }
        
        function initVoice() {
            updateStatus('正在初始化语音系统...');
            
            if (!speechSynthesis) {
                updateStatus('❌ 浏览器不支持语音合成');
                return;
            }
            
            // 获取语音列表
            function loadVoices() {
                voices = speechSynthesis.getVoices();
                console.log('所有可用语音:', voices);
                
                if (voices.length === 0) {
                    updateStatus('❌ 未找到可用语音');
                    return;
                }
                
                // 选择中文语音
                const chineseVoices = voices.filter(voice => 
                    voice.lang.includes('zh') || 
                    voice.name.includes('Chinese') ||
                    voice.name.includes('中文')
                );
                
                console.log('中文语音:', chineseVoices);
                
                if (chineseVoices.length > 0) {
                    // 优先选择微软语音
                    currentVoice = chineseVoices.find(voice => 
                        voice.name.includes('Microsoft')
                    ) || chineseVoices[0];
                } else {
                    currentVoice = voices[0];
                }
                
                updateStatus(`✅ 语音系统就绪! 找到 ${voices.length} 个语音，${chineseVoices.length} 个中文语音`);
                updateVoiceInfo();
            }
            
            // 立即尝试加载
            loadVoices();
            
            // 如果没有语音，等待加载
            if (voices.length === 0) {
                speechSynthesis.addEventListener('voiceschanged', loadVoices);
            }
        }
        
        // 拼音到汉字映射表（简化版）
        const pinyinToCharMap = {
            'de': '的', 'yī': '一', 'shì': '是', 'le': '了',
            'wǒ': '我', 'nǐ': '你', 'tā': '他', 'hǎo': '好',
            'xué': '学', 'xí': '习', 'hàn': '汉', 'zì': '字',
            'yi': '一', 'wo': '我', 'ni': '你', 'ta': '他',
            'hao': '好', 'xue': '学', 'xi': '习', 'han': '汉',
            'zi': '字', 'shi': '是', 'zai': '在', 'you': '有',
            'ren': '人', 'bu': '不', 'ge': '个', 'shang': '上',
            'men': '们', 'lai': '来', 'dao': '到', 'shi': '时',
            'da': '大', 'wei': '为', 'zhong': '中', 'shuo': '说',
            'sheng': '生', 'guo': '国', 'nian': '年', 'zhe': '着',
            'jiu': '就', 'na': '那', 'he': '和', 'yao': '要',
            'ta': '她', 'chu': '出', 'ye': '也', 'de': '得',
            'li': '里', 'hou': '后', 'zi': '自', 'yi': '以',
            'hui': '会', 'jia': '家', 'ke': '可', 'xia': '下',
            'er': '而', 'guo': '过', 'tian': '天', 'qu': '去',
            'neng': '能', 'dui': '对', 'xiao': '小', 'duo': '多',
            'ran': '然', 'yu': '于', 'xin': '心', 'xue': '学'
        };

        function processPinyin(pinyin) {
            // 如果有对应的汉字，使用汉字发音
            if (pinyinToCharMap[pinyin]) {
                return pinyinToCharMap[pinyin];
            }
            return pinyin;
        }

        function testVoice(text, buttonEl) {
            if (isPlaying) {
                console.log('语音正在播放中，跳过');
                return;
            }

            if (!currentVoice) {
                updateStatus('❌ 请先初始化语音系统');
                return;
            }

            isPlaying = true;
            buttonEl.classList.add('playing');
            updateStatus(`🎵 正在播放: ${text}`);

            // 停止当前播放
            speechSynthesis.cancel();

            // 创建语音
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = currentVoice;
            utterance.volume = 1.0;
            utterance.rate = 0.6;
            utterance.pitch = 1.0;
            utterance.lang = 'zh-CN';

            utterance.onend = function() {
                console.log('播放完成:', text);
                buttonEl.classList.remove('playing');
                isPlaying = false;
                updateStatus('✅ 播放完成');
            };

            utterance.onerror = function(event) {
                console.error('播放错误:', event);
                buttonEl.classList.remove('playing');
                isPlaying = false;
                updateStatus('❌ 播放失败: ' + event.error);
            };

            utterance.onstart = function() {
                console.log('开始播放:', text);
            };

            // 开始播放
            speechSynthesis.speak(utterance);
        }

        function testPinyin(pinyin, buttonEl) {
            if (isPlaying) {
                console.log('语音正在播放中，跳过');
                return;
            }

            if (!currentVoice) {
                updateStatus('❌ 请先初始化语音系统');
                return;
            }

            // 处理拼音，转换为对应汉字以获得正确发音
            const processedText = processPinyin(pinyin);

            isPlaying = true;
            buttonEl.classList.add('playing');
            updateStatus(`🎵 正在播放拼音: ${pinyin} (使用: ${processedText})`);

            // 停止当前播放
            speechSynthesis.cancel();

            // 创建语音，使用处理后的文本
            const utterance = new SpeechSynthesisUtterance(processedText);
            utterance.voice = currentVoice;
            utterance.volume = 1.0;
            utterance.rate = 0.6;
            utterance.pitch = 1.0;
            utterance.lang = 'zh-CN';

            utterance.onend = function() {
                console.log('拼音播放完成:', pinyin, '->', processedText);
                buttonEl.classList.remove('playing');
                isPlaying = false;
                updateStatus('✅ 拼音播放完成');
            };

            utterance.onerror = function(event) {
                console.error('拼音播放错误:', event);
                buttonEl.classList.remove('playing');
                isPlaying = false;
                updateStatus('❌ 拼音播放失败: ' + event.error);
            };

            utterance.onstart = function() {
                console.log('开始播放拼音:', pinyin, '->', processedText);
            };

            // 开始播放
            speechSynthesis.speak(utterance);
        }
        
        function stopVoice() {
            speechSynthesis.cancel();
            isPlaying = false;
            
            // 移除所有播放动画
            document.querySelectorAll('.test-btn').forEach(btn => {
                btn.classList.remove('playing');
            });
            
            updateStatus('🛑 已停止播放');
        }
        
        async function testAll() {
            if (isPlaying) {
                updateStatus('⏸️ 请等待当前播放完成');
                return;
            }
            
            const buttons = document.querySelectorAll('.test-btn');
            const texts = Array.from(buttons).map(btn => btn.textContent);
            
            updateStatus('🎵 开始测试所有语音...');
            
            for (let i = 0; i < Math.min(6, texts.length); i++) {
                const text = texts[i];
                const button = buttons[i];
                
                updateStatus(`🎵 测试 ${i + 1}/6: ${text}`);
                
                // 播放
                testVoice(text, button);
                
                // 等待播放完成
                await new Promise(resolve => {
                    const checkComplete = () => {
                        if (!isPlaying) {
                            resolve();
                        } else {
                            setTimeout(checkComplete, 100);
                        }
                    };
                    checkComplete();
                });
                
                // 间隔
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            updateStatus('✅ 测试完成');
        }
        
        // 页面加载完成后自动初始化
        window.addEventListener('load', function() {
            console.log('页面加载完成，开始初始化');
            setTimeout(initVoice, 500);
        });
        
        // 调试信息
        console.log('脚本加载完成');
        console.log('speechSynthesis 支持:', !!window.speechSynthesis);
    </script>
</body>
</html>
