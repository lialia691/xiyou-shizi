<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼音发音演示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        
        .demo-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .character-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .character-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .character-card.playing {
            animation: cardPulse 0.6s ease-in-out;
            background: rgba(255, 255, 255, 0.4);
        }
        
        @keyframes cardPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .character {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .pinyin {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .meaning {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .controls {
            text-align: center;
            margin: 30px 0;
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            margin: 0 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .status {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 0.9em;
        }
        
        .instruction {
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>🎵 拼音发音演示</h1>
        
        <div class="instruction">
            点击下面的汉字卡片听发音
        </div>
        
        <div class="status" id="status">
            正在初始化语音系统...
        </div>
        
        <div class="controls">
            <button class="control-btn" onclick="initDemo()">🔄 重新初始化</button>
            <button class="control-btn" onclick="testAllChars()">🎵 播放全部</button>
            <button class="control-btn" onclick="toggleSpeech()">🔊 开关语音</button>
        </div>
        
        <div class="character-grid" id="characterGrid">
            <!-- 汉字卡片将在这里动态生成 -->
        </div>
    </div>

    <script src="speech-system.js"></script>
    <script>
        let speechSystem = null;
        let isPlaying = false;
        
        const demoCharacters = [
            { char: '你', pinyin: 'nǐ', meaning: '你好的你' },
            { char: '好', pinyin: 'hǎo', meaning: '好坏的好' },
            { char: '学', pinyin: 'xué', meaning: '学习的学' },
            { char: '习', pinyin: 'xí', meaning: '练习的习' },
            { char: '汉', pinyin: 'hàn', meaning: '汉字的汉' },
            { char: '字', pinyin: 'zì', meaning: '文字的字' },
            { char: '西', pinyin: 'xī', meaning: '西游的西' },
            { char: '游', pinyin: 'yóu', meaning: '游戏的游' },
            { char: '记', pinyin: 'jì', meaning: '记录的记' },
            { char: '识', pinyin: 'shí', meaning: '识字的识' },
            { char: '一', pinyin: 'yī', meaning: '数字一' },
            { char: '二', pinyin: 'èr', meaning: '数字二' }
        ];
        
        async function initDemo() {
            const statusEl = document.getElementById('status');
            
            try {
                statusEl.innerHTML = '🔄 正在初始化语音系统...';
                
                speechSystem = new SpeechSystem();
                await speechSystem.init();
                
                const status = speechSystem.getStatus();
                
                if (status.isSupported && status.isEnabled) {
                    statusEl.innerHTML = `
                        ✅ 语音系统就绪！<br>
                        🎤 当前语音: ${status.currentVoice}<br>
                        🔊 音量: ${(status.settings.volume * 100).toFixed(0)}% | 
                        ⚡ 语速: ${status.settings.rate.toFixed(1)}x
                    `;
                    generateCharacterCards();
                } else {
                    statusEl.innerHTML = '❌ 语音系统不可用，请检查浏览器设置';
                }
            } catch (error) {
                statusEl.innerHTML = `❌ 初始化失败: ${error.message}`;
                console.error('初始化失败:', error);
            }
        }
        
        function generateCharacterCards() {
            const gridEl = document.getElementById('characterGrid');
            gridEl.innerHTML = '';
            
            demoCharacters.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <div class="character">${item.char}</div>
                    <div class="pinyin">${item.pinyin}</div>
                    <div class="meaning">${item.meaning}</div>
                `;
                
                card.onclick = () => playCharacterSound(item, card);
                gridEl.appendChild(card);
            });
        }
        
        async function playCharacterSound(item, cardElement) {
            if (!speechSystem || isPlaying) return;
            
            try {
                isPlaying = true;
                cardElement.classList.add('playing');
                
                // 播放汉字和拼音
                await speechSystem.speakCharacter(item.char, item.pinyin);
                
                setTimeout(() => {
                    cardElement.classList.remove('playing');
                    isPlaying = false;
                }, 600);
                
            } catch (error) {
                console.error('播放失败:', error);
                cardElement.classList.remove('playing');
                isPlaying = false;
            }
        }
        
        async function testAllChars() {
            if (!speechSystem || isPlaying) return;
            
            isPlaying = true;
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = '🎵 正在播放全部汉字...';
            
            for (let i = 0; i < demoCharacters.length; i++) {
                const item = demoCharacters[i];
                const cards = document.querySelectorAll('.character-card');
                const card = cards[i];
                
                if (card) {
                    card.classList.add('playing');
                    
                    try {
                        await speechSystem.speakCharacter(item.char, item.pinyin);
                        await new Promise(resolve => setTimeout(resolve, 800)); // 间隔800ms
                    } catch (error) {
                        console.error('播放失败:', error);
                    }
                    
                    card.classList.remove('playing');
                }
            }
            
            isPlaying = false;
            statusEl.innerHTML = '✅ 全部播放完成！';
            
            // 3秒后恢复状态显示
            setTimeout(() => {
                const status = speechSystem.getStatus();
                statusEl.innerHTML = `
                    ✅ 语音系统就绪！<br>
                    🎤 当前语音: ${status.currentVoice}<br>
                    🔊 音量: ${(status.settings.volume * 100).toFixed(0)}% | 
                    ⚡ 语速: ${status.settings.rate.toFixed(1)}x
                `;
            }, 3000);
        }
        
        function toggleSpeech() {
            if (!speechSystem) return;
            
            const isEnabled = speechSystem.isEnabled;
            speechSystem.toggle(!isEnabled);
            
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `🔊 语音功能已${!isEnabled ? '启用' : '禁用'}`;
            
            setTimeout(() => {
                if (speechSystem.isEnabled) {
                    const status = speechSystem.getStatus();
                    statusEl.innerHTML = `
                        ✅ 语音系统就绪！<br>
                        🎤 当前语音: ${status.currentVoice}<br>
                        🔊 音量: ${(status.settings.volume * 100).toFixed(0)}% | 
                        ⚡ 语速: ${status.settings.rate.toFixed(1)}x
                    `;
                }
            }, 2000);
        }
        
        // 页面加载时自动初始化
        window.addEventListener('DOMContentLoaded', initDemo);
    </script>
</body>
</html>
